name: social-web-prod

services:
    redis:
        image: redis:7-alpine
        container_name: social-web-redis-prod
        restart: unless-stopped
        command:
            [
                "sh",
                "-c",
                'redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"',
            ]
        environment:
            REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
        volumes:
            - redis_prod_data:/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'redis-cli --no-auth-warning -a "$${REDIS_PASSWORD}" ping | grep PONG',
                ]
            interval: 10s
            timeout: 5s
            retries: 5

    migrate:
        container_name: social-web-migrate-prod
        build:
            context: ./api
            target: migration
        restart: "no"
        environment:
            NODE_ENV: production
            DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}

    seed-users:
        container_name: social-web-seed-users-prod
        build:
            context: ./api
            target: migration
        profiles:
            - seed
        restart: "no"
        command: ["npm", "run", "seed:users"]
        environment:
            NODE_ENV: production
            DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
            SEED_USERS: ${SEED_USERS:-100000}
            SEED_BATCH_SIZE: ${SEED_BATCH_SIZE:-1000}
            SEED_PASSWORD: ${SEED_PASSWORD:?Set SEED_PASSWORD}
        depends_on:
            migrate:
                condition: service_completed_successfully

    api:
        container_name: social-web-api-prod
        build:
            context: ./api
            target: production
        restart: unless-stopped
        ports:
            - "${API_PORT:-3001}:3001"
        environment:
            NODE_ENV: production
            TRUST_PROXY: ${TRUST_PROXY:-false}
            PORT: 3001
            CORS_ORIGIN: ${CORS_ORIGIN:?Set CORS_ORIGIN}
            WEB_APP_URL: ${WEB_APP_URL:?Set WEB_APP_URL}
            DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
            REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD}@redis:6379
            BULLMQ_PREFIX: ${BULLMQ_PREFIX:-social-web-prod}
            BULLMQ_JOB_ATTEMPTS: ${BULLMQ_JOB_ATTEMPTS:-3}
            BULLMQ_BACKOFF_DELAY_MS: ${BULLMQ_BACKOFF_DELAY_MS:-5000}
            BULLMQ_REMOVE_ON_COMPLETE: ${BULLMQ_REMOVE_ON_COMPLETE:-1000}
            BULLMQ_REMOVE_ON_FAIL: ${BULLMQ_REMOVE_ON_FAIL:-5000}
            JWT_ACCESS_TOKEN_SECRET: ${JWT_ACCESS_TOKEN_SECRET:?Set JWT_ACCESS_TOKEN_SECRET}
            JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
            JWT_REFRESH_TOKEN_SECRET: ${JWT_REFRESH_TOKEN_SECRET:?Set JWT_REFRESH_TOKEN_SECRET}
            JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
            OAUTH_STATE_SECRET: ${OAUTH_STATE_SECRET:-}
            GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
            GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
            GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3001/auth/google/callback}
            CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
            CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
            CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
            CLOUDINARY_UPLOAD_FOLDER: ${CLOUDINARY_UPLOAD_FOLDER:-social-web-prod}
            CLOUDINARY_SECURE: ${CLOUDINARY_SECURE:-true}
            SMTP_HOST: ${SMTP_HOST:-}
            SMTP_PORT: ${SMTP_PORT:-587}
            SMTP_SECURE: ${SMTP_SECURE:-false}
            SMTP_USER: ${SMTP_USER:-}
            SMTP_PASS: ${SMTP_PASS:-}
            EMAIL_FROM: ${EMAIL_FROM:-Social Web <no-reply@localhost>}
            EMAIL_VERIFICATION_TOKEN_TTL_MINUTES: ${EMAIL_VERIFICATION_TOKEN_TTL_MINUTES:-30}
            PASSWORD_RESET_TOKEN_TTL_MINUTES: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:-30}
            LOG_FORMAT: ${LOG_FORMAT:-json}
            LOG_LEVEL: ${LOG_LEVEL:-info}
            PRISMA_QUERY_LOG: ${PRISMA_QUERY_LOG:-false}
        expose:
            - "3001"
        depends_on:
            migrate:
                condition: service_completed_successfully
            redis:
                condition: service_healthy

    web:
        container_name: social-web-web-prod
        build:
            context: ./web
            target: production
            args:
                API_URL: ${API_URL:-http://api:3001}
                API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:3001}
        restart: unless-stopped
        environment:
            NODE_ENV: production
            PORT: 3000
            HOSTNAME: 0.0.0.0
            API_URL: ${API_URL:-http://api:3001}
            API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:3001}
            NEXT_TELEMETRY_DISABLED: 1
        ports:
            - "${WEB_PORT:-3000}:3000"
        depends_on:
            api:
                condition: service_started

volumes:
    redis_prod_data:
