name: social-web-dev

services:
    postgres:
        image: postgres:16-alpine
        container_name: social-web-postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: social_web
            POSTGRES_USER: social_web
            POSTGRES_PASSWORD: social_web
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U social_web -d social_web"]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    postgres_data:
