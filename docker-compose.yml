name: social-web-dev

services:
    postgres:
        image: postgres:16-alpine
        container_name: social-web-postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: social_web
            POSTGRES_USER: social_web
            POSTGRES_PASSWORD: social_web
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U social_web -d social_web"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: social-web-redis
        restart: unless-stopped
        command: ["redis-server", "--appendonly", "yes"]
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    postgres_data:
    redis_data:
