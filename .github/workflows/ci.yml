name: CI

on:
    push:
        branches:
            - dev
            - main
    pull_request:
        branches:
            - dev
            - main
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    api:
        name: API
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: api
        env:
            NODE_ENV: test
            PORT: 3001
            CORS_ORIGIN: http://localhost:3000
            DATABASE_URL: postgresql://social_web:social_web@localhost:5432/social_web?schema=public
            REDIS_URL: redis://localhost:6379
            JWT_ACCESS_TOKEN_SECRET: ci-access-token-secret
            JWT_ACCESS_EXPIRES_IN: 15m
            JWT_REFRESH_TOKEN_SECRET: ci-refresh-token-secret
            JWT_REFRESH_EXPIRES_IN: 7d
            LOG_FORMAT: json
            LOG_LEVEL: error
            PRISMA_QUERY_LOG: false
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: api/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            # - name: Test
            #   run: npm test -- --runInBand

            # - name: Test e2e
            #   run: npm run test:e2e -- --runInBand

            - name: Build
              run: npm run build

    web:
        name: Web
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: web
        env:
            API_URL: http://api:3001
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm
                  cache-dependency-path: web/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Type check
              run: npx tsc --noEmit

            - name: Build
              run: npm run build
